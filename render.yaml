# =============================================================================
# Render Blueprint — one-click public deploy.
#
# Provisions three resources in one region:
#   • hft-db       — managed PostgreSQL 16   (free plan)
#   • hft-redis    — managed Key Value/Redis (free plan, internal-only)
#   • hft-terminal — the web service (Docker), serving SPA + API + WebSocket
#                    same-origin via Dockerfile.web.
#
# Deploy:  Render Dashboard → New → Blueprint → pick this repo.
# Spec:    https://render.com/docs/blueprint-spec
# =============================================================================

databases:
  - name: hft-db
    plan: free
    databaseName: hft
    user: hft
    region: oregon

services:
  # ---- Managed Redis (Key Value) ----
  - type: keyvalue
    name: hft-redis
    plan: free
    region: oregon
    ipAllowList: []            # internal connections only (no public access)
    maxmemoryPolicy: allkeys-lru

  # ---- Web service: SPA + API + WebSocket (single same-origin process) ----
  - type: web
    name: hft-terminal
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      # Strong 256-bit secret generated by Render (satisfies the prod guard).
      - key: JWT_SECRET_KEY
        generateValue: true
      # Postgres connection string (coerced postgres:// -> postgresql:// in app).
      - key: DATABASE_URL
        fromDatabase:
          name: hft-db
          property: connectionString
      # Redis connection string from the Key Value instance above.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hft-redis
          property: connectionString
      # Same-origin deploy → allow the Render host (TrustedHostMiddleware).
      - key: ALLOWED_HOSTS
        value: '["hft-terminal.onrender.com", "localhost", "127.0.0.1"]'
      # Deterministic 24/7 synthetic market: zero external data dependencies.
      - key: USE_SYNTHETIC_MARKET
        value: "true"
      - key: USE_FAKE_REDIS
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
