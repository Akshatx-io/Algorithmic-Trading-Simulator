# =============================================================================
# CI pipeline — HFT Trading Platform
#
# Phase 2.0–2.2 strictness profile:
# - Frontend uses `npm install` (not `npm ci`) — Phase 2.6 will regenerate
#   the lockfile and switch to `npm ci`.
# - Ruff lint + format check run as ADVISORY (continue-on-error). Tightened
#   to blocking in Phase 2.7 per ROADMAP §2.7.
# - mypy is advisory until the service/repository layer lands in Phase 2.3.
# - pytest is BLOCKING — the smoke tests must pass.
# - Docker build sanity is BLOCKING — image must build.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"
  # Bypass GitHub's Node 20 deprecation warnings for actions until we move to
  # the v5 actions family in Phase 3.3 deploy work.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:

  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------
  backend:
    name: backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL:   postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      REDIS_URL:      redis://localhost:6379/0
      ENVIRONMENT:    test
      JWT_SECRET_KEY: ci-only-secret-key-not-a-real-secret-32chars
      LOG_LEVEL:      WARNING

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff) — advisory until Phase 2.7
        continue-on-error: true
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Type-check (mypy) — advisory until Phase 2.3
        continue-on-error: true
        run: mypy app

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term -ra

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install — npm install (regenerates lockfile)
        # We use `npm install` (not `npm ci`) until Phase 2.6 regenerates
        # the lockfile committed to the repo. `npm ci` requires exact sync,
        # and Phase 2.1 added zustand + tanstack/react-query without updating
        # the lockfile.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Lint — advisory until Phase 2.7
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker image build (sanity check — no push)
  # ---------------------------------------------------------------------------
  docker:
    name: docker (build sanity)
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target:  api
          push:    false
          tags:    hft-api:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
