# =============================================================================
# CI pipeline — HFT Trading Platform
#
# Phase 2.0 changes:
# - Cache pip via setup-python (audit 10.5).
# - Cache npm via setup-node.
# - Replaced flake8 + black + isort + mypy install with single ruff install
#   (mypy still runs; ruff replaces the three formatters).
# - Removed `npm test` step (audit 10.6 — no test script exists yet; Phase
#   2.7 reintroduces it).
# - Removed the placeholder `deploy-staging` job (audit 10.7). Real deploy
#   lands in Phase 3.3.
# - pyproject.toml replaces requirements.txt (audit 3.7).
#
# Phase 2.7 will add: pytest coverage upload, real frontend test suite,
# k6 load test on a scheduled trigger.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"

jobs:

  # ---------------------------------------------------------------------------
  # Backend: lint, type-check, test
  # ---------------------------------------------------------------------------
  backend:
    name: backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Type-check (mypy)
        run: mypy app
        # Phase 2.3+ will tighten this. For now, mypy is informational.
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          ENVIRONMENT:  test
          JWT_SECRET_KEY: ci-only-secret-key-not-a-real-secret-32chars
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend: lint + build (tests added in Phase 2.7)
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # `npm test` re-enabled in Phase 2.7 once Vitest is installed.

  # ---------------------------------------------------------------------------
  # Docker image build (sanity check — no push)
  # ---------------------------------------------------------------------------
  docker:
    name: docker (build sanity)
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target:  api
          push:    false
          tags:    hft-api:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
