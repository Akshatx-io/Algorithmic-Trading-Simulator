[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
markers =
    unit: pure unit tests, no I/O
    integration: integration tests (db, redis, http)
    slow: slow running tests (>1s)
asyncio_mode = auto
