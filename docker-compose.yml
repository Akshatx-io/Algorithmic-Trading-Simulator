# =============================================================================
# docker-compose.yml — HFT Trading Platform (development topology)
#
# `docker compose up` brings up the full stack: postgres, redis, api, frontend.
# Workers are co-located with the api process in Phase 2 (the supervisor in
# main.py owns the engines). Phase 2.5+ may extract them to a separate service.
#
# Production overrides live in docker-compose.prod.yml (Phase 3.3).
#
# Phase 2.0 deliverable. See ROADMAP.md.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary DB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hft-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hft_db}
      POSTGRES_USER:     ${POSTGRES_USER:-hft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hft_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hft_user} -d ${POSTGRES_DB:-hft_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — cache, pub/sub, idempotency store, rate limit counters
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hft-redis
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — FastAPI REST + WebSocket + (Phase 2) background engines
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: hft-api
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hft_user}:${POSTGRES_PASSWORD:-hft_password}@postgres:5432/${POSTGRES_DB:-hft_db}
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    # Hot-reload in dev: mount source, override CMD with --reload
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./main.py:/app/main.py
      - ./logs:/app/logs
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server (Phase 2.6 will polish this into prod nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: hft-frontend
    working_dir: /app
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL:  ws://localhost:8000/api/v1/ws
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # pgAdmin (optional, dev profile only)
  # Usage: docker compose --profile tools up
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hft-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@hft.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hft-redis-commander
    profiles: ["tools"]
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:

networks:
  default:
    name: hft-network
    driver: bridge
