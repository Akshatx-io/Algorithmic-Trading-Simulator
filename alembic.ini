[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file as a
# standalone script, false otherwise
# standalone = false

# enable multiple heads
# multiple_heads = false

# if true, sqlalchemy-migrate is used
# sqlalchemy_migrate = false

# set to 'true' to prepend the revision number
# to the file template
# revision_environment = false

# set to 'true' to use relative path from config file
# for sql scripts
# sourceless = false

# if true, a file is written to the current directory
# the first time alembic is run, to track the location
# of the config file
# output_encoding = utf-8

# sqlalchemy url
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# after generating new migration files.

# format using "black" - use the console_scripts runner, against the "black" entrypoint
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 79

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic